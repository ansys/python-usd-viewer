  code-style:
    name: Code style
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/code-style@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ env.MAIN_PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-all-dev \
            libglew-dev \
            libglu1-mesa-dev \
            libtbb-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxt-dev \
            libxmu-dev \
            libxpm-dev \
            libxaw7-dev \
            python3-dev \
            nasm

      - name: Get OpenUSD version
        id: openusd-version
        run: |
          # Clone OpenUSD repo temporarily to get the latest commit hash
          git clone --depth 1 https://github.com/PixarAnimationStudios/OpenUSD.git temp-usd
          USD_VERSION=$(cd temp-usd && git rev-parse HEAD)
          echo "version=$USD_VERSION" >> $GITHUB_OUTPUT
          rm -rf temp-usd

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache OpenUSD installation
        id: cache-openusd
        uses: actions/cache@v4
        with:
          path: |
            usd_install
            OpenUSD
          key: ${{ runner.os }}-openusd-${{ steps.openusd-version.outputs.version}}-python-${{
            env.MAIN_PYTHON_VERSION }}
          restore-keys: |
            ${{ runner.os }}-openusd-${{ steps.openusd-version.outputs.version }}-

      - name: Install the library
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Set up build environment variables
        run: |
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(($(nproc) / 2))" >> $GITHUB_ENV
          echo "MAKEFLAGS=-j$(($(nproc) / 2))" >> $GITHUB_ENV

      - name: Run usd-setup command
        if: steps.cache-openusd.outputs.cache-hit != 'true'
        timeout-minutes: 90
        run: |
          echo "Building OpenUSD from source (this may take 60-90 minutes)..."
          usd-setup

      - name: Upload build logs on failure
        if: failure() && steps.cache-openusd.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: usd-setup-logs
          path: |
            usd-setup.log
            OpenUSD/build/**/*.log
          if-no-files-found: ignore

      - name: Verify OpenUSD installation
        run: |
          if [ -d "usd_install" ]; then
            echo "✓ OpenUSD installation found"
            ls -la usd_install
            # Check for critical files
            if [ -d "usd_install/lib" ]; then
              echo "✓ Libraries directory exists"
              ls -la usd_install/lib | head -20
            fi
            if [ -d "usd_install/bin" ]; then
              echo "✓ Binaries directory exists"
              ls -la usd_install/bin | head -20
            fi
          else
            echo "✗ OpenUSD installation not found"
            exit 1
          fi

      - name: Install test dependencies
        run: pip install ".[tests]"

      - name: Run pytest
        run: pytest --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  doc-style:
    name: Doc style
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/doc-style@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  actions-style:
    name: Actions style
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/check-actions-security@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          generate-summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          auditing-level: high

  wheelhouse:
    name: Wheelhouse / ${{ matrix.os }} / ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    needs: code-style
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: ansys/actions/build-wheelhouse@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python }}
          whitelist-license-check: 'PySide6, PySide6_Addons, PySide6_Essentials, shiboken6'

  doc-build:
    name: "Building library documentation"
    runs-on: ubuntu-latest
    needs: doc-style
    steps:
      - name: "Run Ansys documentation building action"
        uses: ansys/actions/doc-build@v10.2.3
        with:
          group-dependencies-name: "doc"

  build-library:
    name: Build library
    runs-on: ubuntu-latest
    needs: [wheelhouse]
    steps:
      - uses: ansys/actions/build-library@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  upload_dev_docs:
    name: Upload dev documentation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-library]
    steps:
      - name: Deploy the latest documentation
        uses: ansys/actions/doc-deploy-dev@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  release:
    name: Release project
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags') }}
    needs: build-library
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # needed for pypi publish action
      contents: write # needed for release action
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ env.PACKAGE_NAME }}-artifacts
          path: ${{ env.PACKAGE_NAME }}-artifacts

      - name: Release to the public PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          repository-url: https://upload.pypi.org/legacy/
          print-hash: true
          packages-dir: ${{ env.PACKAGE_NAME }}-artifacts
          skip-existing: false

      - name: Release to GitHub
        uses: ansys/actions/release-github@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          library-name: ${{ env.PACKAGE_NAME }}

  doc-deploy-stable:
    name: Deploy stable docs
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: ansys/actions/doc-deploy-stable@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  automerge-prs:
    name: Automerge PRs (dependabot and pre-commit.ci only)
    runs-on: ubuntu-latest
    needs: [build-library]
    if: github.event_name == 'pull_request'
    permissions:
      contents: write # needed for automerge action
      pull-requests: write # needed for automerge action
    steps:
      - name: Automerge PRs
        uses: ansys/actions/hk-automerge-prs@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          approver: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          approver-token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

      - name: If pre-commit PR, add assignee
        if: startsWith(github.head_ref, 'pre-commit-ci-update-config')
        run: gh pr edit --add-assignee pyansys-ci-bot "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
