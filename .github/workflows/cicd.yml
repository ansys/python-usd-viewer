name: GitHub CI

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - '*'
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: ansys-tools-usdviewer
  MAIN_PYTHON_VERSION: 3.13
  DOCUMENTATION_CNAME: tools.docs.pyansys.com

permissions:
  contents: read

jobs:

