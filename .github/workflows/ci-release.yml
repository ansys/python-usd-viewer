name: CI - Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  PACKAGE_NAME: ansys-tools-usdviewer
  MAIN_PYTHON_VERSION: 3.13
  DOCUMENTATION_CNAME: usd-viewer.docs.pyansys.com

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for the changelog
      pull-requests: write # Required for the changelog
    steps:
      - name: Deploy changelog
        uses: ansys/actions/doc-deploy-changelog@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  # vulnerabilities:
  #   name: Vulnerabilities
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: PyAnsys Vulnerability check (on main)
  #       if: github.ref == 'refs/heads/main'
  #       uses: ansys/actions/check-vulnerabilities@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
  #       with:
  #         python-version: ${{ env.MAIN_PYTHON_VERSION }}
  #         python-package-name: ${{ env.PACKAGE_NAME }}
  #         token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
  #         upload-reports: true

  #     - name: PyAnsys Vulnerability check (on dev mode)
  #       if: github.ref != 'refs/heads/main'
  #       uses: ansys/actions/check-vulnerabilities@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
  #       with:
  #         python-version: ${{ env.MAIN_PYTHON_VERSION }}
  #         python-package-name: ${{ env.PACKAGE_NAME }}
  #         token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
  #         dev-mode: true
  #         upload-reports: true
  #         hide-log: false

  code-style:
    name: Code style
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/code-style@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  doc-style:
    name: Doc style
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/doc-style@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  actions-style:
    name: Actions style
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/check-actions-security@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          generate-summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          auditing-level: high

  wheelhouse:
    name: Wheelhouse / ${{ matrix.os }} / ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    needs: code-style
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: ansys/actions/build-wheelhouse@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python }}
          whitelist-license-check: 'PySide6, PySide6_Addons, PySide6_Essentials, shiboken6'

  doc-build:
    name: Building library documentation
    runs-on: ubuntu-latest
    needs: doc-style
    steps:
      - name: Run Ansys documentation building action
        uses: ansys/actions/doc-build@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          group-dependencies-name: "doc"
          check-links: false

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Install python-usd-viewer and tests dependencies
        run: uv sync --no-dev --group tests --frozen

      - name: Run tests
        run: uv run pytest tests

  build-library:
    name: Build library
    runs-on: ubuntu-latest
    needs: [wheelhouse]
    steps:
      - uses: ansys/actions/build-library@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  release:
    name: Release project
    needs: [build-library, tests, doc-build, changelog]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # needed for pypi publish action
      contents: write # needed for release action
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-artifacts
          path: ${{ env.PACKAGE_NAME }}-artifacts

      # Uncomment the following once ready to publish to PyPI
      # - name: Release to the public PyPI
      #   uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
      #   with:
      #     repository-url: https://upload.pypi.org/legacy/
      #     print-hash: true
      #     packages-dir: ${{ env.PACKAGE_NAME }}-artifacts
      #     skip-existing: false

      - name: Release to GitHub
        uses: ansys/actions/release-github@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          library-name: ${{ env.PACKAGE_NAME }}

  doc-deploy-stable:
    name: Deploy stable docs
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: ansys/actions/doc-deploy-stable@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
